[Poem]
ItemTitle0=七佛通戒偈
ItemAutor0=诸佛世尊
ItemContent0=诸恶莫作，众善奉行，自净其意，是诸佛教。

ItemTitle1=莫作恶偈
ItemAutor1=观音菩萨
ItemContent1=莫作诸恶，修诸善法，自净其意，是诸佛教。

ItemTitle3=福行偈
ItemAutor3=弥勒佛
ItemContent3=福为最胜宝，福称无尽藏；福如彼明灯，福同于父母。

ItemTitle4=众善偈
ItemAutor4=阿弥陀佛
ItemContent4=众善应可爱，如父复如母；美善体安然，能离于喧诤。

ItemTitle5=动念偈
ItemAutor5=普贤菩萨
ItemContent5=一念善 福虽未至 祸已远离；一念恶祸虽未至福已远离。

ItemTitle6=消业偈
ItemAutor6=阿弥陀佛
ItemContent6=一毫之恶，劝人莫作；一毫之善，与人方便。

ItemTitle7=积善偈
ItemAutor7=阿弥陀佛
ItemContent7=积善之家，必有余庆；积不善之家，必有余殃。

ItemTitle8=善业偈
ItemAutor8=阿弥陀佛
ItemContent8=修十善业，离诸恶道，成就一切善法。

ItemTitle9=戒恶偈
ItemAutor9=阿弥陀佛
ItemContent9=不为恶行者，是谓梵行人；常行善法者，现世得安乐。

ItemTitle11=吉祥偈
ItemAutor11=阿弥陀佛
ItemContent11=去恶从就善，避酒知自节，不淫于女色，是为最吉祥。

ItemTitle12=近贤偈
ItemAutor12=阿弥陀佛
ItemContent12=贤夫染人，如近香熏，进智习善，行成芳洁。

ItemTitle17=业行偈
ItemAutor17=阿弥陀佛
ItemContent17=一切恶莫作，一切善应修，遍调于自心，是则诸佛教。

ItemTitle19=善言偈
ItemAutor19=阿弥陀佛
ItemContent19=口宣仁慈，不演恶言；心念善法，不怀恶意。

ItemTitle21=慈心偈
ItemAutor21=阿弥陀佛
ItemContent21=心莫怀嫉妒，口勿说恶言；教多人行善，常修慈心。

ItemTitle22=心净偈
ItemAutor22=阿弥陀佛
ItemContent22=心清净故，世界清净；心杂染故，世界杂染。

ItemTitle23=善恶报偈
ItemAutor23=阿弥陀佛
ItemContent23=善恶之报，如影随形；三世因果，循环不失。

ItemTitle24=布施偈
ItemAutor24=阿弥陀佛
ItemContent24=布施为福业，持戒为安宅，忍辱为大力，精进为净行。

ItemTitle25=修善偈
ItemAutor25=阿弥陀佛
ItemContent25=修善者安，行恶者危；修善者乐，行恶者苦。

ItemTitle26=戒心偈
ItemAutor26=阿弥陀佛
ItemContent26=护意如守城，防心如防盗；一念不善生，速急令灭除。

ItemTitle27=净心偈
ItemAutor27=阿弥陀佛
ItemContent27=心净则佛土净，心善则国土善。

ItemTitle28=离恶偈
ItemAutor28=阿弥陀佛
ItemContent28=远离杀盗淫，妄语两舌等，一切诸恶业，悉皆不造作。

ItemTitle29=善根偈
ItemAutor29=阿弥陀佛
ItemContent29=修诸善根，远离诸恶，常行慈悲，利益众生。

ItemTitle30=慈心偈
ItemAutor30=地藏菩萨本愿经
ItemContent30=慈心不杀，修十善业，孝顺父母，奉事师长。

ItemTitle31=善恶果偈
ItemAutor31=地藏菩萨
ItemContent31=莫造诸恶业，后世堕恶道；勤修诸善根，往生善趣中。

ItemTitle32=修福偈
ItemAutor32=药师琉璃光如来
ItemContent32=修诸福业，远离邪见，不杀不盗，持戒清净。

ItemTitle33=善根偈
ItemAutor33=佛说阿弥陀
ItemContent33=不可以少善根福德因缘，得生彼国。

ItemTitle34=三福偈
ItemAutor34=观无量寿佛
ItemContent34=孝养父母，奉事师长，慈心不杀，修十善业。

ItemTitle37=持戒偈
ItemAutor37=佛遗教经
ItemContent37=持戒常安，身心清净；远离诸恶，常修众善。


ItemTitle40=善业灭罪偈
ItemAutor40=僧伽吒
ItemContent40=修一善业，灭百千亿劫生死重罪。

ItemTitle41=慈悲偈
ItemAutor41=大悲心陀罗尼
ItemContent41=大慈大悲，救苦救难，广大灵感，利益一切众生。

ItemTitle42=六道偈
ItemAutor42=十善业道经
ItemContent42=行十恶者，堕地狱饿鬼畜生道；行十善者，生人天阿修罗道。

ItemTitle43=六道因果偈
ItemAutor43=大般涅槃经
ItemContent43=善因得善果，恶因得恶果；行善生天道，造恶堕三涂。

ItemTitle44=鬼道苦偈
ItemAutor44=法集要颂经
ItemContent44=作恶堕鬼道，颈细如针锋，腹大如须弥，饥渴无有救。

ItemTitle45=功德偈
ItemAutor45=大乘义章
ItemContent45=恶尽曰功，善满称德；功德圆满，自成佛道。

ItemTitle46=净行偈
ItemAutor46=根本说一切有部戒经
ItemContent46=善护身口意，不造诸恶业；常修于善行，是诸佛所赞。




